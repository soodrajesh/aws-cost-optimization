name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # README states "Requires Python 3.10+"; test across the range this
        # tool claims to support.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      # All 54 tests mock boto3/AWS calls (unittest.mock / moto) — none of
      # them hit live AWS Cost Explorer, Price List, or resource APIs, so
      # the full suite runs here with zero AWS credentials configured.
      - name: Run tests
        run: pytest -v
